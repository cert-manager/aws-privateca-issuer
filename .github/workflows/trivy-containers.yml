name: Trivy Scanner - Container Images

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  trivy-scan:
    name: Scan published container image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get image tag from Helm chart
        id: image
        run: echo "tag=$(yq '.appVersion' charts/aws-pca-issuer/Chart.yaml)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::105154636954:role/GithubActionsScanRole-prod-us-east-1
          aws-region: us-east-1
          role-session-name: TrivyScan-${{ github.run_id }}

      - name: Login to Amazon Public ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          registry-type: public

      - name: Pull container image
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: docker pull "public.ecr.aws/k1n1h4h4/cert-manager-aws-privateca-issuer:${IMAGE_TAG}"

      - name: Scan container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: 'public.ecr.aws/k1n1h4h4/cert-manager-aws-privateca-issuer:${{ steps.image.outputs.tag }}'
          output: 'results.json'
          format: 'json'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Download previous CVE list
        uses: actions/download-artifact@v4
        with:
          name: trivy-cve-list
        continue-on-error: true

      - name: Summarize and detect new CVEs
        id: summary
        run: |
          # Rename previously downloaded artifact, default to empty list
          [ -f current-cves.json ] && mv current-cves.json previous-cves.json || echo '[]' > previous-cves.json

          # Extract current CVE IDs
          jq '[.Results[].Vulnerabilities[]?.VulnerabilityID] | unique' results.json > current-cves.json

          # Count by severity in one pass
          eval "$(jq -r '.Results[].Vulnerabilities[]? | .Severity' results.json | sort | uniq -c | awk '{print tolower($2) "=" $1}')"
          echo "critical=${critical:-0}" >> "$GITHUB_OUTPUT"
          echo "high=${high:-0}" >> "$GITHUB_OUTPUT"
          echo "total=$(( ${critical:-0} + ${high:-0} ))" >> "$GITHUB_OUTPUT"

          # Count new CVEs via jq array subtraction
          NEW_COUNT=$(jq --slurpfile prev previous-cves.json '. - $prev[0] | length' current-cves.json)
          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"

          # Is it Monday?
          [ "$(date -u +%u)" = "1" ] && echo "is_monday=true" >> "$GITHUB_OUTPUT" || echo "is_monday=false" >> "$GITHUB_OUTPUT"

      - name: Upload current CVE list
        uses: actions/upload-artifact@v4
        with:
          name: trivy-cve-list
          path: current-cves.json
          overwrite: true

      - name: Send scan results to Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "image_tag": "${{ steps.image.outputs.tag }}",
              "total": "${{ steps.summary.outputs.total }}",
              "critical": "${{ steps.summary.outputs.critical }}",
              "high": "${{ steps.summary.outputs.high }}",
              "new_count": "${{ steps.summary.outputs.new_count }}",
              "is_monday": "${{ steps.summary.outputs.is_monday }}",
              "scan_url": "${{ github.server_url }}/${{ github.repository }}/security/code-scanning",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Convert results to SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: 'public.ecr.aws/k1n1h4h4/cert-manager-aws-privateca-issuer:${{ steps.image.outputs.tag }}'
          output: 'results.sarif'
          format: 'sarif'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          skip-setup-trivy: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: 'results.sarif'
          category: trivy-published
